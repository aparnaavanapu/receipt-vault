name: Receipt Vault CI/CD


on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  checkout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Repository
        run: |
          echo "Repository downloaded successfully."
          pwd
          ls -R